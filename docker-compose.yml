# graphrag llm-engine — docker compose
# Bring everything up: docker compose up -d
# DGX Spark (NVIDIA GB10, ARM64) target.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llm_engine}
      POSTGRES_USER: ${POSTGRES_USER:-llm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llm} -d ${POSTGRES_DB:-llm_engine}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:2026.04.0-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change_me_neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-change_me_neo4j} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  vllm-gemma:
    image: vllm/vllm-openai:gemma4-cu130
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      HF_HOME: /models/hf
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - models:/models
    command:
      - --model
      - ${VLLM_LLM_MODEL:-cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit}
      - --max-model-len
      - "${VLLM_LLM_MAX_MODEL_LEN:-16384}"
      - --max-num-seqs
      - "${VLLM_LLM_MAX_NUM_SEQS:-8}"
      - --gpu-memory-utilization
      - "${VLLM_LLM_GPU_MEM_UTIL:-0.55}"
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 300s

  vllm-chandra:
    image: vllm/vllm-openai:gemma4-cu130
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      HF_HOME: /models/hf
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - models:/models
    command:
      - --model
      - ${VLLM_OCR_MODEL:-datalab-to/chandra-ocr-2}
      - --gpu-memory-utilization
      - "${VLLM_OCR_GPU_MEM_UTIL:-0.25}"
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 300s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      qdrant: { condition: service_healthy }
      neo4j: { condition: service_healthy }
      redis: { condition: service_healthy }
      vllm-gemma: { condition: service_started }
      vllm-chandra: { condition: service_started }
    env_file: [.env]
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - uploads:/data/uploads
      - graphrag_workdir:/data/graphrag
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
      qdrant: { condition: service_healthy }
      neo4j: { condition: service_healthy }
    env_file: [.env]
    volumes:
      - uploads:/data/uploads
      - graphrag_workdir:/data/graphrag
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  models:
  uploads:
  graphrag_workdir:
